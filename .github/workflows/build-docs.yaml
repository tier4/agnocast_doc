name: build-docs

on:
  pull_request:
    types: [labeled, closed]

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'check-page')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: github.event.action != 'closed'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate API Reference
        if: github.event.action != 'closed'
        run: ./generate_api.sh main

      - name: Build docs
        if: github.event.action != 'closed'
        run: mkdocs build -f mkdocs.yaml --strict

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
          action: ${{ github.event.action == 'closed' && 'remove' || 'deploy' }}
